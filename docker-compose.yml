  frontend:
    build: ./inventory-frontend
    container_name: inventory-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8080
    depends_on:
      - api-gateway
    networks:
      - inventory-network

volumes:
  mysql-data:

networks:
  inventory-network:
    driver: bridge
